<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bé Ghép Chữ O - Ô - Ơ</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1a0b36;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Nunito', 'Outfit', sans-serif;
    }

    /* Game Wrapper & Scaling */
    #game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: absolute;
      width: 1024px;
      height: 576px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      overflow: hidden;
      transform-origin: center center;
    }

    /* Screen Overlays */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Start Screen */
    #start-screen {
      background: rgba(26, 11, 54, 0.85);
      backdrop-filter: blur(10px);
    }

    .start-title {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 12px rgba(0,0,0,0.5), 0 0 20px #a855f7;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: 2px;
      font-family: 'Outfit', sans-serif;
    }

    .btn-play {
      padding: 16px 48px;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #ec4899, #8b5cf6);
      border: 4px solid #fff;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: pulse 2s infinite;
    }

    .btn-play:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 30px rgba(236, 72, 153, 0.6), inset 0 -4px 0 rgba(0,0,0,0.2);
    }

    .btn-play:active {
      transform: scale(0.95);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Flying Character */
    #character-sprite {
      position: absolute;
      width: 240px; /* 1.5 times 160px */
      height: auto;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    .flying {
      display: block !important;
      animation: flyAcross 4.5s cubic-bezier(0.445, 0.05, 0.55, 0.95) forwards;
    }

    @keyframes flyAcross {
      0% {
        left: -280px;
        top: 35%;
        transform: translateY(0) rotate(5deg) scaleX(1); /* Facing right, head first */
      }
      20% {
        top: 20%;
        transform: translateY(-20px) rotate(-5deg) scaleX(1);
      }
      40% {
        top: 45%;
        transform: translateY(20px) rotate(5deg) scaleX(1);
      }
      60% {
        top: 25%;
        transform: translateY(-15px) rotate(-3deg) scaleX(1);
      }
      80% {
        top: 40%;
        transform: translateY(10px) rotate(3deg) scaleX(1);
      }
      100% {
        left: 1100px;
        top: 30%;
        transform: translateY(0) rotate(0deg) scaleX(1);
      }
    }

    /* Game Interface HUD */
    #hud {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 8;
      pointer-events: none;
    }

    .hud-title {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 3px 6px rgba(0,0,0,0.4);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
      padding: 8px 24px;
      border-radius: 30px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .hud-controls {
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      border: 3px solid #6366f1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
    }

    .icon-btn:hover {
      transform: scale(1.1);
      background: #fff;
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .icon-btn svg {
      width: 24px;
      height: 24px;
      fill: #6366f1;
    }

    .audio-playing {
      animation: audioPulse 1s infinite alternate;
      background: #8b5cf6;
      border-color: #fff;
    }

    .audio-playing svg {
      fill: #fff;
    }

    @keyframes audioPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.15); box-shadow: 0 0 15px #8b5cf6; }
    }

    /* Main Play Area */
    #play-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 70px;
      padding-top: 50px;
      z-index: 2;
    }

    /* Top Row: Draggable Cards */
    .cards-row {
      display: flex;
      justify-content: center;
      gap: 90px;
      height: 130px;
    }

    .card-slot {
      width: 130px;
      height: 130px;
      position: relative;
    }

    .drag-card {
      width: 130px;
      height: 130px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2), inset 0 -6px 0 rgba(0,0,0,0.05);
      border: 3px solid rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: grab;
      touch-action: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .drag-card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25), inset 0 -6px 0 rgba(0,0,0,0.05);
    }

    .drag-card.dragging {
      cursor: grabbing;
      transform: scale(1.08);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.35);
      transition: none; /* Instant feedback during move */
    }

    .drag-card.matched {
      cursor: default;
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .drag-card.shake {
      animation: shakeCard 0.4s ease-in-out;
    }

    @keyframes shakeCard {
      0%, 100% { margin-left: 0; }
      20%, 60% { margin-left: -10px; }
      40%, 80% { margin-left: 10px; }
    }

    .drag-card img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    /* Bottom Row: Letters */
    .targets-row {
      display: flex;
      justify-content: center;
      gap: 110px;
    }

    .column-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 120px;
      position: relative;
    }

    /* Letter targets (transparent, no circle, border, or background) */
    .letter-circle {
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
      position: relative;
    }

    .letter-circle img {
      width: 95%;
      height: 95%;
      object-fit: contain;
    }

    .column-slot.pulse-bounce .letter-circle {
      transform: scale(1.2);
    }

    /* Particle Effect */
    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: explode 0.8s ease-out forwards;
    }

    @keyframes explode {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(0.2);
        opacity: 0;
      }
    }

    /* Intermediate Level Success Overlay */
    #level-banner {
      background: rgba(139, 92, 246, 0.2);
      pointer-events: none;
    }

    .banner-box {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border: 6px solid #fff;
      border-radius: 30px;
      padding: 30px 60px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      transform: scale(0.7);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #level-banner.active .banner-box {
      transform: scale(1);
      opacity: 1;
    }

    .banner-title {
      font-size: 38px;
      font-weight: 900;
      color: #fff;
      margin: 0;
      text-shadow: 0 3px 6px rgba(0,0,0,0.3);
    }

    /* Victory Screen */
    #victory-screen {
      background: rgba(26, 11, 54, 0.9);
      backdrop-filter: blur(12px);
    }

    .victory-box {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stars-container {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .star {
      width: 70px;
      height: 70px;
      fill: #eab308;
      filter: drop-shadow(0 4px 10px rgba(234, 179, 8, 0.4));
      transform: scale(0);
      opacity: 0;
    }

    .star.bounce-in {
      animation: starBounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes starBounce {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .victory-title {
      font-size: 48px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px rgba(250, 204, 21, 0.6);
      margin-bottom: 10px;
    }

    .victory-subtitle {
      font-size: 22px;
      color: #cbd5e1;
      margin-bottom: 35px;
    }

    .btn-replay {
      padding: 14px 40px;
      font-size: 24px;
      font-weight: 800;
      color: #8b5cf6;
      background: #fff;
      border: 3px solid #8b5cf6;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease;
    }

    .btn-replay:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(255, 255, 255, 0.2);
      background: #f8fafc;
    }

    .btn-replay:active {
      transform: translateY(0);
    }

    /* Confetti particle elements */
    .confetti {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0.8;
      pointer-events: none;
      animation: fall 3.5s linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0deg);
      }
      100% {
        transform: translateY(600px) rotate(720deg);
      }
    }
  </style>
</head>
<body>

  <div id="game-wrapper">
    <!-- Main game container sized at 1024x576 -->
    <div id="game-container">
      
      <!-- Start Screen Overlay -->
      <div id="start-screen" class="screen">
        <h1 class="start-title">BÉ GHÉP CHỮ O - Ô - Ơ</h1>
        <button class="btn-play" onclick="startGame()">Bắt đầu</button>
      </div>

      <!-- Level Banner (transition) -->
      <div id="level-banner" class="screen hidden">
        <div class="banner-box">
          <h2 class="banner-title" id="banner-text">Tuyệt vời!</h2>
        </div>
      </div>

      <!-- Victory Screen -->
      <div id="victory-screen" class="screen hidden">
        <div class="victory-box">
          <div class="stars-container">
            <!-- SVG Star 1 -->
            <svg class="star" id="star-1" viewBox="0 0 24 24"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192L12 .587z"/></svg>
            <!-- SVG Star 2 -->
            <svg class="star" id="star-2" viewBox="0 0 24 24"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192L12 .587z"/></svg>
            <!-- SVG Star 3 -->
            <svg class="star" id="star-3" viewBox="0 0 24 24"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192L12 .587z"/></svg>
          </div>
          <h1 class="victory-title">Chúc mừng!</h1>
          <p class="victory-subtitle">Con đã xuất sắc ghép đúng tất cả các chữ cái!</p>
          <button class="btn-replay" onclick="resetGame()">Chơi lại</button>
        </div>
      </div>

      <!-- HUD: Heads Up Display -->
      <div id="hud">
        <div class="hud-title" id="level-indicator">Lượt 1 / 2</div>
        <div class="hud-controls">
          <button class="icon-btn" id="sound-btn" onclick="triggerVoiceSpeak()" title="Nghe lại hướng dẫn">
            <svg viewBox="0 0 24 24">
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77zm-3 .23L6.5 8H3v8h3.5l4.5 4.5V3.46z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Character (Flying Bird) -->
      <img id="character-sprite" alt="character" />

      <!-- Interactive Play Area -->
      <div id="play-area">
        
        <!-- Draggable Cards row (Hàng trên) -->
        <div class="cards-row" id="draggable-container">
          <div class="card-slot">
            <div class="drag-card" id="card-1" data-match="" onmousedown="onPointerDown(event)" ontouchstart="onPointerDown(event)">
              <img src="" alt="" id="img-card-1">
            </div>
          </div>
          <div class="card-slot">
            <div class="drag-card" id="card-2" data-match="" onmousedown="onPointerDown(event)" ontouchstart="onPointerDown(event)">
              <img src="" alt="" id="img-card-2">
            </div>
          </div>
          <div class="card-slot">
            <div class="drag-card" id="card-3" data-match="" onmousedown="onPointerDown(event)" ontouchstart="onPointerDown(event)">
              <img src="" alt="" id="img-card-3">
            </div>
          </div>
        </div>

        <!-- Letters row (Hàng dưới) -->
        <div class="targets-row">
          
          <!-- Column Slot 1 (o) -->
          <div class="column-slot" data-letter="o" id="slot-o">
            <div class="letter-circle">
              <img src="" alt="o" id="img-o">
            </div>
          </div>

          <!-- Column Slot 2 (ô) -->
          <div class="column-slot" data-letter="oo" id="slot-oo">
            <div class="letter-circle">
              <img src="" alt="ô" id="img-oo-letter">
            </div>
          </div>

          <!-- Column Slot 3 (ơ) -->
          <div class="column-slot" data-letter="ow" id="slot-ow">
            <div class="letter-circle">
              <img src="" alt="ơ" id="img-ow-letter">
            </div>
          </div>

        </div>

      </div>

    </div>
  </div>

    // Game Configuration and State
    const gameConfig = {
      round1: {
        // Items and where they match

          { id: 'cai_o', match: 'oo', label: 'cái ô', src: IMAGES.cai_o },
          { id: 'sup_lo', match: 'ow', label: 'súp lơ', src: IMAGES.sup_lo },

        ],
        // Exact order from left to right as in prompt mockup: cái ô, súp lơ, trứng gà
        startingOrder: ['cai_o', 'sup_lo', 'trung_ga']
      },
      round2: {

    let gameState = {
      currentRound: 1,
      matchedCount: 0,
      roundMatched: { o: false, oo: false, ow: false },
      gameActive: false,
      isSpeaking: false
    };

    // Scaling
    let gameScale = 1;
    function resizeGame() {
      const wrapper = document.getElementById('game-wrapper');
      const container = document.getElementById('game-container');
      const baseWidth = 1024;
      const baseHeight = 576;

      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;

      const scaleX = windowWidth / baseWidth;
      const scaleY = windowHeight / baseHeight;
      gameScale = Math.min(scaleX, scaleY);

      // Apply transform scale
      container.style.transform = `scale(${gameScale})`;
    }
    window.addEventListener('resize', resizeGame);
    window.addEventListener('DOMContentLoaded', () => {
      resizeGame();
      preloadImages();
    });

    // Sound Synthesizer via Web Audio API
    const Sound = {
      ctx: null,
      init() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      },
      playCorrect() {
        if (!this.ctx) this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        this.playTone(523.25, 0.12, 0.15, 'sine'); // C5
        this.playTone(659.25, 0.12, 0.15, 'sine', 0.08); // E5
        this.playTone(783.99, 0.25, 0.15, 'sine', 0.16); // G5
      },
      playIncorrect() {
        if (!this.ctx) this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.25);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + 0.25);
      },
      playVictory() {
        if (!this.ctx) this.init();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        const now = this.ctx.currentTime;
        const melody = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50]; // C Major scale
        melody.forEach((freq, idx) => {
          this.playTone(freq, 0.2, 0.12, 'sine', idx * 0.1);
        });
        // Ending chord
        setTimeout(() => {
          this.playTone(523.25, 0.6, 0.1, 'sine', 0);
          this.playTone(659.25, 0.6, 0.1, 'sine', 0.02);
          this.playTone(783.99, 0.6, 0.1, 'sine', 0.04);
          this.playTone(1046.50, 0.6, 0.15, 'sine', 0.06);
        }, 850);
      },
      playTone(freq, duration, volume, type = 'sine', delay = 0) {
        const now = this.ctx.currentTime + delay;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(volume, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(now);
        osc.stop(now + duration);
      }
    };

    // Preload background & letters
    function preloadImages() {
      document.getElementById('game-container').style.backgroundImage = `url('${IMAGES.background}')`;
      document.getElementById('character-sprite').src = IMAGES.character;
      document.getElementById('img-o').src = IMAGES.o;
      document.getElementById('img-oo-letter').src = IMAGES.oo;
      document.getElementById('img-ow-letter').src = IMAGES.ow;
    }

    // Voice Synthesis for Instructions
    function speakInstruction() {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const text = "Các con hãy kéo hình phù hợp vào các chữ cái bên dưới nhé.";
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'vi-VN';
        utterance.rate = 0.85; // Natural speed for children
        
        // Find Vietnamese voice
        const voices = window.speechSynthesis.getVoices();
        const viVoice = voices.find(v => v.lang.includes('vi') || v.lang.includes('VI'));
        if (viVoice) {
          utterance.voice = viVoice;
        }

        utterance.onstart = () => {
          gameState.isSpeaking = true;
          document.getElementById('sound-btn').classList.add('audio-playing');
        };
        utterance.onend = () => {
          gameState.isSpeaking = false;
          document.getElementById('sound-btn').classList.remove('audio-playing');
        };
        utterance.onerror = () => {
          gameState.isSpeaking = false;
          document.getElementById('sound-btn').classList.remove('audio-playing');
        };

        window.speechSynthesis.speak(utterance);
      }
    }

    function triggerVoiceSpeak() {
      if (!gameState.gameActive) return;
      speakInstruction();
    }

    // Initialize Game Play
    function startGame() {
      // Initialize Sound context on user action
      Sound.init();
      document.getElementById('start-screen').classList.add('hidden');
      
      // Load current round content hidden at first
      prepareRound(1);
      document.getElementById('play-area').style.opacity = '0';
      document.getElementById('hud').style.opacity = '0';

      // Start Character Flying
      triggerFlyingCharacter(() => {
        // Character fly completed callback
        gameState.gameActive = true;
        
        // Fade in HUD & Game area
        document.getElementById('play-area').style.transition = 'opacity 0.6s ease';
        document.getElementById('hud').style.transition = 'opacity 0.6s ease';
        document.getElementById('play-area').style.opacity = '1';
        document.getElementById('hud').style.opacity = '1';
        
        // Speak instruction
        setTimeout(speakInstruction, 300);
      });
    }

    // Flying bird animation
    function triggerFlyingCharacter(callback) {
      const sprite = document.getElementById('character-sprite');
      sprite.classList.remove('flying');
      void sprite.offsetWidth; // Trigger reflow to restart animation
      sprite.classList.add('flying');

      // 4.5s matches CSS duration
      setTimeout(() => {
        sprite.classList.remove('flying');
        if (callback) callback();
      }, 4500);
    }

    // Set up level data
    function prepareRound(roundNumber) {
      gameState.currentRound = roundNumber;
      gameState.matchedCount = 0;
      gameState.roundMatched = { o: false, oo: false, ow: false };

      document.getElementById('level-indicator').textContent = `Lượt ${roundNumber} / 2`;

      // Reset letter styles (remove drop-shadow filters)
      const zones = ['o', 'oo', 'ow'];
      zones.forEach(z => {
        const letterCircle = document.querySelector(`#slot-${z} .letter-circle`);
        if (letterCircle) letterCircle.style.filter = '';
      });

      const roundData = gameConfig[`round${roundNumber}`];
      
      // Load items
      roundData.startingOrder.forEach((itemId, idx) => {
        const itemInfo = roundData.items.find(item => item.id === itemId);
        const card = document.getElementById(`card-${idx + 1}`);
        card.className = 'drag-card';
        card.style.transform = '';
        card.style.transition = '';
        card.style.opacity = '1';
        card.dataset.match = itemInfo.match;
        card.dataset.label = itemInfo.label;
        card.dataset.id = itemInfo.id;
        
        const img = document.getElementById(`img-card-${idx + 1}`);
        img.src = itemInfo.src;
        img.alt = itemInfo.label;
      });
    }

    // Drag & Drop State Variables
    let activeCard = null;
    let pointerStartX = 0;
    let pointerStartY = 0;
    let cardStartX = 0;
    let cardStartY = 0;

    function onPointerDown(e) {
      if (!gameState.gameActive) return;
      const card = e.currentTarget;
      if (card.classList.contains('matched')) return;

      activeCard = card;
      card.classList.add('dragging');
      card.style.zIndex = '100';

      const pointer = e.touches ? e.touches[0] : e;
      pointerStartX = pointer.clientX;
      pointerStartY = pointer.clientY;

      // Extract current translate coordinates from style.transform if any
      const transform = card.style.transform;
      const match = transform.match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/);
      if (match) {
        cardStartX = parseFloat(match[1]);
        cardStartY = parseFloat(match[2]);
      } else {
        cardStartX = 0;
        cardStartY = 0;
      }

      // Add movement listeners to window to track drag outside container
      window.addEventListener('mousemove', onPointerMove, { passive: false });
      window.addEventListener('touchmove', onPointerMove, { passive: false });
      window.addEventListener('mouseup', onPointerUp);
      window.addEventListener('touchend', onPointerUp);
      
      e.preventDefault();
    }

    function onPointerMove(e) {
      if (!activeCard) return;
      
      const pointer = e.touches ? e.touches[0] : e;
      const dx = pointer.clientX - pointerStartX;
      const dy = pointer.clientY - pointerStartY;

      // Account for game scale zoom
      const localDx = cardStartX + (dx / gameScale);
      const localDy = cardStartY + (dy / gameScale);

      activeCard.style.transform = `translate(${localDx}px, ${localDy}px)`;

      // Dynamic hover logic
      checkTargetHover(activeCard);
      e.preventDefault();
    }

    function checkTargetHover(card) {
      const cardRect = card.getBoundingClientRect();
      const cardCenterX = cardRect.left + cardRect.width / 2;
      const cardCenterY = cardRect.top + cardRect.height / 2;

      const zones = ['o', 'oo', 'ow'];
      zones.forEach(z => {
        const zoneEl = document.querySelector(`#slot-${z} .letter-circle`);
        const zoneRect = zoneEl.getBoundingClientRect();

        const isOverlapping = (
          cardCenterX >= zoneRect.left &&
          cardCenterX <= zoneRect.right &&
          cardCenterY >= zoneRect.top &&
          cardCenterY <= zoneRect.bottom
        );

        if (isOverlapping) {
          zoneEl.classList.add('hovered');
          if (card.dataset.match === z) {
            zoneEl.classList.add('correct-hover');
            // Apply corresponding shadow color
            if (z === 'o') zoneEl.style.filter = 'drop-shadow(0 0 15px #facc15)';
            else if (z === 'oo') zoneEl.style.filter = 'drop-shadow(0 0 15px #f43f5e)';
            else if (z === 'ow') zoneEl.style.filter = 'drop-shadow(0 0 15px #22c55e)';
          }
        } else {
          zoneEl.classList.remove('hovered', 'correct-hover');
          zoneEl.style.filter = '';
        }
      });
    }

    function onPointerUp(e) {
      window.removeEventListener('mousemove', onPointerMove);
      window.removeEventListener('touchmove', onPointerMove);
      window.removeEventListener('mouseup', onPointerUp);
      window.removeEventListener('touchend', onPointerUp);

      if (!activeCard) return;
      
      activeCard.classList.remove('dragging');
      activeCard.style.zIndex = '';
      
      verifyDrop(activeCard);
      activeCard = null;
    }

    function verifyDrop(card) {
      const cardRect = card.getBoundingClientRect();
      const cardCenterX = cardRect.left + cardRect.width / 2;
      const cardCenterY = cardRect.top + cardRect.height / 2;

      let matchedZone = null;
      const zones = ['o', 'oo', 'ow'];
      
      zones.forEach(z => {
        const zoneEl = document.querySelector(`#slot-${z} .letter-circle`);
        const zoneRect = zoneEl.getBoundingClientRect();

        const isOverlapping = (
          cardCenterX >= zoneRect.left &&
          cardCenterX <= zoneRect.right &&
          cardCenterY >= zoneRect.top &&
          cardCenterY <= zoneRect.bottom
        );

        // Remove hover styles
        zoneEl.classList.remove('hovered', 'correct-hover');
        zoneEl.style.filter = '';

        if (isOverlapping && card.dataset.match === z && !gameState.roundMatched[z]) {
          matchedZone = z;
        }
      });

      if (matchedZone) {
        // Success match!
        snapCardToTarget(card, matchedZone);
      } else {
        // Bounce back to start
        Sound.playIncorrect();
        // Shake card anim
        card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        card.style.transform = 'translate(0px, 0px)';
        
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 400);
      }
    }

    function snapCardToTarget(card, zoneKey) {
      gameState.roundMatched[zoneKey] = true;
      gameState.matchedCount++;
      
      card.classList.add('matched');
      Sound.playCorrect();

      const letterCircle = document.querySelector(`#slot-${zoneKey} .letter-circle`);
      const columnEl = document.getElementById(`slot-${zoneKey}`);

      // Calculate translation to shrink/disappear card onto the letter
      const cardRect = card.getBoundingClientRect();
      const targetRect = letterCircle.getBoundingClientRect();

      // Vector to target center in page pixels
      const dx = (targetRect.left + targetRect.width / 2) - (cardRect.left + cardRect.width / 2 - getTranslateValues(card).x);
      const dy = (targetRect.top + targetRect.height / 2) - (cardRect.top + cardRect.height / 2 - getTranslateValues(card).y);

      // Convert to local game space
      const localDx = dx / gameScale;
      const localDy = dy / gameScale;

      // Make the card fly to the letter, scale down to 0, and fade out
      card.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease-out';
      card.style.transform = `translate(${localDx}px, ${localDy}px) scale(0)`;
      card.style.opacity = '0';

      // Bounce letter circle below
      columnEl.classList.add('pulse-bounce');
      setTimeout(() => columnEl.classList.remove('pulse-bounce'), 500);

      // Trigger sparkle particle explosion at the letter
      createParticles(targetRect.left + targetRect.width / 2, targetRect.top + targetRect.height / 2);

      // Check level completion
      if (gameState.matchedCount === 3) {
        gameState.gameActive = false;
        setTimeout(completeRound, 1200);
      }
    }

    // Helper to get raw translate values
    function getTranslateValues(el) {
      const style = window.getComputedStyle(el);
      const matrix = style.transform || style.webkitTransform || style.mozTransform;
      if (!matrix || matrix === 'none') {
        return { x: 0, y: 0 };
      }
      const matrixValues = matrix.split('(')[1].split(')')[0].split(',');
      return {
        x: parseFloat(matrixValues[4]),
        y: parseFloat(matrixValues[5])
      };
    }

    // Exploding correct stars particles
    function createParticles(x, y) {
      const container = document.getElementById('game-container');
      const containerRect = container.getBoundingClientRect();
      
      // Convert screen coords to container space
      const localX = (x - containerRect.left) / gameScale;
      const localY = (y - containerRect.top) / gameScale;

      const colors = ['#facc15', '#f43f5e', '#22c55e', '#a855f7', '#60a5fa'];
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        // Random style and physics
        const size = Math.random() * 8 + 6;
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.background = color;
        particle.style.left = `${localX}px`;
        particle.style.top = `${localY}px`;

        // Blast angle & speed
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 80 + 40;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity;

        particle.style.setProperty('--tx', `${tx}px`);
        particle.style.setProperty('--ty', `${ty}px`);

        container.appendChild(particle);

        // Cleanup
        setTimeout(() => particle.remove(), 800);
      }
    }

    // Level Transition / Win
    function completeRound() {
      if (gameState.currentRound === 1) {
        // Go to Round 2
        showRoundTransition('Chuẩn bị sang lượt 2!', () => {
          prepareRound(2);
          
          // Animate bird flying across
          triggerFlyingCharacter(() => {
            gameState.gameActive = true;
            document.getElementById('play-area').style.opacity = '1';
            document.getElementById('hud').style.opacity = '1';
            speakInstruction();
          });
        });
      } else {
        // Complete Game!
        showVictoryScreen();
      }
    }

    // Mid-level transitional screen
    function showRoundTransition(text, onComplete) {
      const banner = document.getElementById('level-banner');
      const bannerText = document.getElementById('banner-text');
      
      bannerText.textContent = text;
      
      // Hide playing interface smoothly
      document.getElementById('play-area').style.opacity = '0';
      document.getElementById('hud').style.opacity = '0';
      
      banner.classList.remove('hidden');
      banner.classList.add('active');

      Sound.playTone(523.25, 0.15, 0.15, 'sine');
      Sound.playTone(659.25, 0.15, 0.15, 'sine', 0.1);
      Sound.playTone(783.99, 0.35, 0.15, 'sine', 0.2);

      setTimeout(() => {
        banner.classList.remove('active');
        setTimeout(() => {
          banner.classList.add('hidden');
          if (onComplete) onComplete();
        }, 400);
      }, 2000);
    }

    // Final game win
    function showVictoryScreen() {
      const vic = document.getElementById('victory-screen');
      vic.classList.remove('hidden');
      Sound.playVictory();

      // Trigger falling confetti
      createConfetti();

      // Pop stars sequentially
      setTimeout(() => document.getElementById('star-1').classList.add('bounce-in'), 300);
      setTimeout(() => document.getElementById('star-2').classList.add('bounce-in'), 600);
      setTimeout(() => document.getElementById('star-3').classList.add('bounce-in'), 900);
    }

    function createConfetti() {
      const container = document.getElementById('game-container');
      const colors = ['#facc15', '#f43f5e', '#22c55e', '#ec4899', '#3b82f6'];
      
      for (let i = 0; i < 60; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        
        const sizeW = Math.random() * 8 + 6;
        const sizeH = Math.random() * 12 + 8;
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        conf.style.width = `${sizeW}px`;
        conf.style.height = `${sizeH}px`;
        conf.style.background = color;
        
        // Random falling properties
        conf.style.left = `${Math.random() * 100}%`;
        conf.style.animationDelay = `${Math.random() * 2}s`;
        conf.style.animationDuration = `${Math.random() * 2 + 2}s`;
        
        container.appendChild(conf);

        // Remove after standard animation loop finishes
        setTimeout(() => conf.remove(), 4000);
      }
    }

    // Restart game from beginning
    function resetGame() {
      // Clear confetti
      const confs = document.querySelectorAll('.confetti');
      confs.forEach(c => c.remove());

      // Reset star animations
      document.getElementById('star-1').classList.remove('bounce-in');
      document.getElementById('star-2').classList.remove('bounce-in');
      document.getElementById('star-3').classList.remove('bounce-in');

      document.getElementById('victory-screen').classList.add('hidden');
      
      // Load Round 1 and run start sequence
      startGame();
    }
  </script>
</body>
